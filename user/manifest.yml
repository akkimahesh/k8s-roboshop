apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
data:
  MONGO: "true"
  REDIS_HOST: "redis"
  MONGO_URL: "mongodb://mongodb:27017/users"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  labels:
      project: roboshop
      environment: dev
      tier: backend
      components: user
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: backend
      components: user
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: backend
        components: user
    spec:
      containers:
      - name: user
        image: akkimahesh/user:v1
        resources:
          requests:
            memory: "50Mi"
            cpu: "150m"
          limits:
            memory: "100Mi"
            cpu: "250m"
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2 #if the probe fails 2 times, the container will be restarted
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15 #wait for 15 seconds before checking the health
          periodSeconds: 3 #every 3 seconds check the health
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: user
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop
spec:
  selector:
      project: roboshop
      environment: dev
      tier: backend
      components: user
  ports:
    - protocol: TCP
      port: 8080  #service port
      targetPort: 8080 #container port
