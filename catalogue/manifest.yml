apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
      project: roboshop
      environment: dev
      tier: backend
      components: catalogue
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: backend
      components: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: backend
        components: catalogue
    spec:
      containers:
      - name: catalogue
        image: akkimahesh/catalogue:v1
        ports:
        - containerPort: 27017
        envFrom:
        - configMapRef:
            name: catalogue
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
spec:
  selector:
      project: roboshop
      environment: dev
      tier: backend
      components: catalogue
  ports:
    - protocol: TCP
      port: 8080  #service port
      targetPort: 8080 #container port
