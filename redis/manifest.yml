apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
      project: roboshop
      environment: dev
      tier: db
      components: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: db
      components: redis
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: db
        components: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        resources:
          requests:
            memory: "250Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 6379
          failureThreshold: 2 #if the probe fails 2 times, the container will be restarted
          initialDelaySeconds: 25
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 25 #wait for 25 seconds before checking the health
          periodSeconds: 3 #every 3 seconds check the health
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
      project: roboshop
      environment: dev
      tier: db
      components: redis
  ports:
    - protocol: TCP
      port: 6379  #service port
      targetPort: 6379 #container port
