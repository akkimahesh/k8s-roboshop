apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  labels:
      project: roboshop
      environment: dev
      tier: backend
      components: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: backend
      components: payment
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: backend
        components: payment
    spec:
      containers:
      - name: payment
        image: akkimahesh/payments:v1
        resources:
          requests:
            memory: "50Mi"
            cpu: "150m"
          limits:
            memory: "100Mi"
            cpu: "250m"
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2 #if the probe fails 2 times, the container will be restarted
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15 #wait for 15 seconds before checking the health
          periodSeconds: 3 #every 3 seconds check the health
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: payment
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
spec:
  selector:
      project: roboshop
      environment: dev
      tier: backend
      components: payment
  ports:
    - protocol: TCP
      port: 8080  #service port
      targetPort: 8080 #container port
