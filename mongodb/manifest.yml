apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
      project: roboshop
      environment: dev
      tier: db
      components: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: db
      components: mongodb
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: db
        components: mongodb
    spec:
      containers:
      - name: mongodb
        image: akkimahesh/mongodb:v1
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        readinessProbe:
          tcpSocket:
            port: 27017
          failureThreshold: 2 #if the probe fails 2 times, the container will be restarted
          initialDelaySeconds: 25
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 25 #wait for 25 seconds before checking the health
          periodSeconds: 3 #every 3 seconds check the health
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
spec:
  selector:
      project: roboshop
      environment: dev
      tier: db
      components: mongodb
  ports:
    - protocol: TCP
      port: 27017  #service port
      targetPort: 27017 #container port
