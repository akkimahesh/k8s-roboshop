apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: roboshop
data:
  # username: YWRtaW4K
  # password: QWRtaW5AMTIzCg==
  MYSQL_ROOT_PASSWORD: Um9ib1Nob3BAMQ==
#echo -n "Admin@123" | base64
#echo -n "QWRtaW5AMTIzCg==" | base64 --decode
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
      project: roboshop
      environment: dev
      tier: db
      components: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: db
      components: mysql
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: db
        components: mysql
    spec:
      containers:
      - name: mysql
        image: akkimahesh/mysql:1.2.0
        envFrom:
        - secretRef:
            name: mysql-secrets
        resources:
          requests:
            memory: "500Mi"
            cpu: "500m"
          limits:
            memory: "1000Mi"
            cpu: "900m"
        readinessProbe:
          tcpSocket:
            port: 3306
          failureThreshold: 2 #if the probe fails 2 times, the container will be restarted
          initialDelaySeconds: 60
          periodSeconds: 20
        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 60 #wait for 60 seconds before checking the health
          periodSeconds: 20 #every 20 seconds check the health
        ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
      project: roboshop
      environment: dev
      tier: db
      components: mysql
  ports:
    - protocol: TCP
      port: 3306  #service port
      targetPort: 3306 #container port
